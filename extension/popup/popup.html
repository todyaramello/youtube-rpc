<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1c1c1c;
      color: #e0e0e0;
    }
    h1 { font-size: 16px; margin-bottom: 12px; color: #fff; }
    .status { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 13px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot.green { background: #43b581; }
    .dot.red { background: #f04747; }
    .track { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; }
    .track-title { font-size: 14px; color: #fff; font-weight: 600; }
    .track-artist { font-size: 12px; color: #999; margin-top: 2px; }
    .track-time { font-size: 11px; color: #666; margin-top: 4px; }
    .empty { color: #666; font-size: 12px; font-style: italic; margin-top: 8px; }
    .footer { margin-top: 12px; padding-top: 12px; border-top: 1px solid #333; font-size: 11px; color: #555; }
  </style>
</head>
<body>
  <h1>youtube rpc</h1>
  <div class="status">
    <span class="dot" id="wsDot"></span>
    <span id="wsStatus">server: disconnected</span>
  </div>
  <div class="track" id="trackInfo">
    <div class="empty">no track yet - open youtube and play smth</div>
  </div>
  <div class="footer">make sure the server is running — <code>npm start</code> in the <code>server/</code> folder</div>

  <script src="popup.js"></script>
</body>
</html>
